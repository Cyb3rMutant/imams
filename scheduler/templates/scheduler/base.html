<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>
      {% block title %}Imams Connect{% endblock %}
    </title>
    <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f7f5f0;
      color: #1a1a1a;
      min-height: 100vh;
    }

    nav {
      background: #1b4332;
      padding: 0.9rem 2rem;
      display: flex;
      align-items: center;
      gap: 1.5rem;
      flex-wrap: wrap;
    }

    .nav-brand { font-weight: 700; font-size: 1.1rem; color: #fff; text-decoration: none; margin-right: auto; }
    nav a { color: #d8f3dc; text-decoration: none; font-size: 0.9rem; }
    nav a:hover { color: #fff; text-decoration: underline; }
    .nav-sep { color: #2d6a4f; }

    main { max-width: 860px; margin: 2.5rem auto; padding: 0 1.5rem; }

    h1 { font-size: 1.75rem; margin-bottom: 0.35rem; color: #1b4332; }
    h2 { font-size: 1.15rem; margin-bottom: 0.9rem; color: #1b4332; }
    .subtitle { color: #666; margin-bottom: 2rem; font-size: 0.925rem; }

    .card { background: #fff; border-radius: 12px; padding: 1.75rem; box-shadow: 0 1px 4px rgba(0,0,0,0.08); margin-bottom: 1.5rem; }

    .form-group { margin-bottom: 1.15rem; }

    label { display: block; font-weight: 600; font-size: 0.875rem; margin-bottom: 0.3rem; color: #333; }

    input[type=text], input[type=tel], input[type=date], input[type=number],
    input[type=email], input[type=url], select, textarea {
      width: 100%;
      padding: 0.55rem 0.75rem;
      border: 1.5px solid #ccc;
      border-radius: 6px;
      font-size: 0.925rem;
      font-family: inherit;
      background: #fff;
      transition: border-color 0.15s;
    }
    input:focus, select:focus, textarea:focus { outline: none; border-color: #1b4332; }

    .checkbox-row { display: flex; align-items: center; gap: 0.5rem; }
    .checkbox-row input[type=checkbox] { width: auto; accent-color: #1b4332; }
    .checkbox-row label { margin: 0; font-weight: 400; font-size: 0.9rem; }

    .error-list { list-style: none; margin-top: 0.3rem; }
    .error-list li { color: #c0392b; font-size: 0.82rem; }

    .btn {
      display: inline-block;
      padding: 0.65rem 1.5rem;
      background: #1b4332;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 0.925rem;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.15s;
    }
    .btn:hover { background: #2d6a4f; }
    .btn-sm { padding: 0.35rem 0.85rem; font-size: 0.82rem; }
    .btn-danger { background: transparent; border: 1.5px solid #e74c3c; color: #e74c3c; }
    .btn-danger:hover { background: #e74c3c; color: #fff; }
    .btn-ghost { background: transparent; border: 1.5px solid #ccc; color: #555; }
    .btn-ghost:hover { background: #f0ede8; color: #333; }

    .badge { display: inline-block; font-size: 0.72rem; font-weight: 700; padding: 0.2rem 0.55rem; border-radius: 99px; text-transform: uppercase; letter-spacing: 0.04em; }
    .badge-green  { background: #d8f3dc; color: #1b4332; }
    .badge-amber  { background: #fff3cd; color: #7d5a00; }
    .badge-red    { background: #fde8e8; color: #c0392b; }
    .badge-gray   { background: #f0ede8; color: #666; }
    .badge-blue   { background: #dbeafe; color: #1e40af; }

    table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
    thead { background: #f0ede8; }
    th { padding: 0.65rem 1rem; text-align: left; font-size: 0.78rem; text-transform: uppercase; letter-spacing: 0.05em; color: #555; }
    td { padding: 0.75rem 1rem; border-bottom: 1px solid #f0ede8; vertical-align: middle; }
    tbody tr:last-child td { border-bottom: none; }
    tbody tr:hover td { background: #faf9f6; }

    .empty { color: #999; font-size: 0.9rem; padding: 1.5rem 0; text-align: center; }

    {% block extra_style %}{% endblock %}
    </style>
  </head>
  <body>
    <nav>
      <a href="{% url 'home' %}" class="nav-brand">Imams Connect</a>
      {% if session_mosque_id %}
        <a href="{% url 'mosque_portal' %}">My Mosque</a>
        <a href="{% url 'portal_logout' %}">Log out</a>
      {% elif session_imam_id %}
        <a href="{% url 'imam_portal' %}">My Bookings</a>
        <a href="{% url 'imam_training' %}">Training</a>
        <a href="{% url 'portal_logout' %}">Log out</a>
      {% else %}
        <a href="{% url 'mosque_request' %}">Register Mosque</a>
        <a href="{% url 'imam_application' %}">Register as Imam</a>
        <span class="nav-sep">|</span>
        <a href="{% url 'mosque_login' %}">Mosque Login</a>
        <a href="{% url 'imam_login' %}">Imam Login</a>
      {% endif %}
      {% if request.user.is_staff %}
        <span class="nav-sep">|</span>
        <a href="{% url 'admin_panel' %}">Admin Panel</a>
      {% endif %}
    </nav>
    <main>
      {% block content %}{% endblock %}
    </main>
  </body>
</html>
